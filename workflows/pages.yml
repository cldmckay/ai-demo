name: Build file index for Pages

on:
  push:
    branches: [main]   # change to your Pages source branch if it's not main
    paths-ignore:
      - 'index.html'   # avoid an infinite loop when the bot commits index.html

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate index.html
        run: python .github/scripts/build_index.py

      - name: Commit index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update index.html [auto]"
          git push
