/* ---------- GLOSSARY ---------- */
const GLOSSARY = [
["Foundations: How Neural Networks Compute","",""],
["Neural network","A function built from layers of simple units, each computing a weighted sum of its inputs and passing the result through a nonlinearity. Stacked deep enough and trained on enough data, these layers learn hierarchies of features — edges become shapes become faces; letters become words become meaning. Every system discussed below is some arrangement of this one idea."],
["Parameters (weights)","The adjustable numbers inside a neural network — the knobs training turns. When a vendor says their model has 70 billion parameters, they mean 70 billion of these numbers. Parameter count is a rough (and increasingly unreliable) proxy for capability."],
["Loss function","A single number measuring how wrong the model's current output is compared to the desired output. All of training is the attempt to push this number down. Choosing what to measure as loss is choosing what the model will learn to care about."],
["Gradient descent","The optimization algorithm behind essentially all modern AI: compute which direction of change to each parameter would reduce the loss, then nudge every parameter slightly in that direction. Repeat billions of times."],
["Backpropagation","The algorithm that makes gradient descent tractable — an efficient application of the calculus chain rule that computes, in one backward pass through the network, how much each of billions of parameters contributed to the error."],
["Training vs. inference","Training is the expensive, one-time process of setting the parameters (months, thousands of GPUs). Inference is running the finished model to answer a query (milliseconds to minutes). Vendors' costs, latency promises, and privacy claims all hinge on which one they're talking about."],
["Tokenization","Text is split into 'tokens' — chunks of roughly 3–4 characters — and each is mapped to an integer before the model ever sees it. Explains many quirks: why models miscount letters in words, why some languages cost more per API call, and why pricing is quoted per token."],
["Embedding","The representation of a token, sentence, or document as a long list of numbers (a vector) positioned so that similar meanings land near each other in space. Embeddings are the currency of modern AI — they're how search, RAG, and recommendation systems compare meaning rather than keywords."],
["Transformer","The neural network architecture (from Google's 2017 paper 'Attention Is All You Need') behind virtually every frontier model. Its key trick, attention, lets it process all tokens in a sequence in parallel and learn which words should inform which others. The 'T' in GPT."],
["Attention","The mechanism at the heart of transformers: every token computes how relevant every other token in the context is to it, and pulls in information accordingly. It's why models handle 'it' referring to something ten sentences back. Its cost grows with the square of sequence length — the root of context-window limits."],
["Context window","The maximum amount of text (in tokens) a model can consider at once — its working memory. Everything outside the window effectively doesn't exist for the model. Vendor claims about huge context windows deserve scrutiny: retrieval quality often degrades in the middle of very long contexts."],
["Compute (FLOPs) & GPUs","Training is measured in floating-point operations (FLOPs); the hardware is GPUs or custom accelerators (TPUs, etc.). Compute — not algorithms — has been the dominant driver of capability gains, which is why AI strategy is inseparable from hardware, energy, and budget conversations."],

["Training & Alignment: How Models Are Made","",""],
["Pretraining","Phase one of building an LLM: train the network on trillions of tokens of internet text with one simple objective — predict the next token. This is where nearly all the compute goes and where the model absorbs its knowledge of language, facts, and reasoning patterns."],
["Self-supervised learning","Learning from data that supplies its own labels — no human annotation required. Next-token prediction is self-supervised: the 'right answer' is just the text that actually comes next. This is what unlocked training on internet-scale data."],
["Next-token prediction","The deceptively simple objective underlying LLMs: given text so far, predict the probability of every possible next token. Getting extremely good at this turns out to require modeling grammar, facts, logic, and even theory of mind — which is why the objective produces such general capability."],
["Scaling laws","The empirical finding that model capability improves smoothly and predictably as you increase compute, data, and parameters together. Scaling laws are why labs bet billions on bigger training runs — and the debate about whether they're flattening is the central strategic question in AI."],
["Emergent capabilities","Abilities that appear (or appear to appear) somewhat abruptly at scale rather than gradually — e.g., multi-step arithmetic or translation. Contested territory: some researchers argue emergence is partly an artifact of how we measure. Useful skeptical lens for vendor claims."],
["Supervised fine-tuning (SFT)","Phase two: take the pretrained model and train it further on curated examples of high-quality question-answer conversations, teaching it to behave like an assistant rather than an autocomplete engine."],
["RLHF","Reinforcement Learning from Human Feedback — phase three. Humans rank pairs of model outputs; those rankings train a 'reward model' that scores responses automatically; the LLM is then optimized against that score. RLHF is why ChatGPT feels helpful and polite — and the source of failure modes like sycophancy and reward gaming."],
["Reward model","A separate neural network trained to predict which of two responses a human would prefer, used as a scalable stand-in for human judgment during RLHF. When models learn to exploit gaps between the reward model and what humans actually want, that's 'reward hacking.'"],
["Constitutional AI / RLAIF","Anthropic's approach of replacing much of the human feedback in RLHF with AI feedback guided by an explicit written 'constitution' of principles. More broadly, RLAIF (RL from AI Feedback) uses models to supervise models — increasingly standard as capabilities outpace what humans can cheaply evaluate."],
["Reasoning models & test-time compute","A post-2024 shift: instead of only making training bigger, let the model 'think longer' at inference — generating extended internal chains of reasoning before answering (OpenAI's o-series, DeepSeek-R1, Claude's extended thinking). Trained with reinforcement learning on problems with checkable answers. Changed the economics: capability now scales with inference spend too."],
["Chain of thought (CoT)","Prompting or training a model to produce intermediate reasoning steps before its final answer, which markedly improves performance on multi-step problems. The visible 'thinking' of reasoning models — though research cautions the stated chain doesn't always reflect the actual computation."],
["Mixture of experts (MoE)","An architecture where only a fraction of the model's parameters activate for any given token — a routing network picks which 'experts' to consult. How modern models get huge total capacity while keeping inference cost manageable. When a vendor cites total vs. active parameters, this is why."],
["Distillation","Training a small, cheap model to imitate the outputs of a large, expensive one — retaining much of the capability at a fraction of the inference cost. Ubiquitous in production, and a live controversy when done across company lines against terms of service."],
["Quantization","Compressing a model by storing its parameters at lower numerical precision (e.g., 4-bit instead of 16-bit), shrinking memory and cost with modest quality loss. Why capable models can now run on a laptop — relevant to any on-premises or privacy-driven deployment conversation."],

["Generative Media: Diffusion & Beyond","",""],
["Generative vs. discriminative","Discriminative models classify or predict labels for existing data (is this email spam?). Generative models learn the underlying distribution of the data well enough to produce new samples from it (write an email; paint an image). The entire current wave is generative."],
["Diffusion model","The technology behind most AI image, video, and audio generation (Stable Diffusion, Midjourney, Sora). Training: take real images and progressively corrupt them with noise, teaching the network to reverse each small step. Generation: start from pure random noise and iteratively denoise, with a text prompt steering each step toward matching imagery. Intuition: a sculptor who has learned to see the statue inside the static."],
["Latent space","A compressed, learned representation where each point corresponds to a possible output and nearby points correspond to similar outputs. Modern 'latent diffusion' runs the denoising process in this compact space rather than on raw pixels — the efficiency breakthrough that made Stable Diffusion feasible."],
["VAE (variational autoencoder)","A network that learns to compress data into latent space and reconstruct it. In image generators, the VAE is the translator: it shrinks images into latents for diffusion to work on, then decodes the finished latent back into pixels."],
["CLIP / multimodal embeddings","A model trained on millions of image-caption pairs to place images and text into the same embedding space, so 'a photo of a dog' and an actual dog photo land near each other. This shared space is how text prompts steer image generation and how models 'see.'"],
["GAN (generative adversarial network)","The pre-diffusion generation technique: a generator network tries to fool a discriminator network that judges real vs. fake, and they improve in competition. Largely superseded by diffusion for images, but the term still circulates and the adversarial idea recurs across ML."],
["Autoregressive generation","Generating output one token at a time, each conditioned on everything so far — how LLMs write. Contrast with diffusion, which refines a whole canvas at once. The two paradigms are now cross-pollinating (diffusion-based text models, autoregressive image models), a genuine research frontier."],
["World model","A model that learns the dynamics of an environment — how scenes evolve, how objects interact — well enough to simulate it. Video generators like Sora and interactive systems like DeepMind's Genie are argued to be early world models; the term signals ambitions beyond media generation toward robotics and planning."],
["Multimodal model","A single model that natively handles multiple data types — text, images, audio, video — in and/or out. The frontier default: GPT-5-class and Claude and Gemini models all accept images; increasingly they generate across modalities too."],

["Applied Systems: What Vendors Are Actually Selling","",""],
["Foundation model","A large model pretrained on broad data and adapted to many downstream tasks — the 'platform' layer of the AI economy. Most vendor products are thin-to-thick layers built atop a handful of foundation models, a fact worth surfacing in any procurement conversation."],
["System prompt / prompt engineering","The system prompt is hidden instruction text that configures a model's behavior for an application; prompt engineering is the craft of writing inputs that elicit reliable outputs. Much commercial 'secret sauce' is, at bottom, a well-tuned system prompt over someone else's foundation model."],
["Hallucination","A model confidently generating false information — fabricated citations, invented facts. Not a bug to be patched but a structural property of next-token prediction: the model outputs what is plausible, not what is verified. Mitigations (RAG, citations, abstention training) reduce but do not eliminate it."],
["RAG (retrieval-augmented generation)","Instead of relying on what the model memorized in training, first retrieve relevant documents (via embedding search over your own content) and put them in the context window, then have the model answer from those. The standard pattern for grounding AI in institutional knowledge — course catalogs, policy libraries, research corpora."],
["Vector database","A database optimized for storing embeddings and finding nearest neighbors fast — the retrieval engine under RAG. When a vendor says 'we index your documents,' they typically mean: chunk, embed, store here."],
["AI agent","A model given tools, memory, and a loop: it plans, acts (calls APIs, searches, writes files), observes results, and iterates toward a goal with reduced human intervention. The dominant product paradigm of 2025–26 — and the one deserving the most governance scrutiny, since agents act rather than merely advise."],
["Tool use / function calling","The mechanism that lets a model invoke external software — search engines, databases, calendars, code execution — by emitting structured calls that an orchestration layer executes. The bridge from 'chatbot' to 'agent.'"],
["MCP (Model Context Protocol)","An open standard (originated by Anthropic, since widely adopted) for connecting AI models to external tools and data sources — a universal adapter so every integration doesn't have to be custom-built. Expect it in vendor architecture diagrams."],
["Fine-tune vs. RAG vs. prompt","The practical decision hierarchy for adapting AI to your institution: prompting is cheapest and usually sufficient; RAG adds your knowledge without retraining; fine-tuning changes model behavior itself and is warranted least often. A vendor leading with fine-tuning should be asked why the cheaper rungs don't suffice."],
["Evals & benchmarks","Structured tests of model capability (MMLU, HLE, SWE-bench) or head-to-head human preference rankings (LMArena). Essential but gameable: training data contamination, teaching-to-the-test, and benchmark saturation are chronic. 'Which evals, run by whom, on what version?' is a strong vendor question."],

["Governance, Safety & Policy","",""],
["Alignment","The problem of ensuring AI systems reliably pursue the objectives and values their operators intend — spanning today's practical work (RLHF, refusal training) and longer-horizon concerns about highly capable systems. The organizing concept of AI safety research."],
["Interpretability","Research into what is actually happening inside a model's billions of parameters — identifying internal features and circuits that correspond to concepts. Anthropic's work here (dictionary learning, circuit tracing) is the field's most public thread. Matters for policy: you cannot fully audit what you cannot inspect."],
["Red teaming","Systematically attacking a model or AI application to surface harmful behaviors, jailbreaks, data leaks, and failure modes before deployment. Now an expected line item in responsible deployment — ask vendors who red-teams their product and how often."],
["Model card / system card","Structured documentation accompanying a model release: intended uses, training data description, evaluation results, limitations, safety testing. The AI analogue of a nutrition label; its presence and quality is a fast signal of vendor maturity."],
["NIST AI RMF","The U.S. National Institute of Standards and Technology's voluntary AI Risk Management Framework, organized around four functions: Govern, Map, Measure, Manage. The most common shared vocabulary for AI risk programs in U.S. institutions, including universities."],
["ISO/IEC 42001","The international management-system standard for AI (the ISO 9001 of AI governance): certifiable organizational processes for responsible AI development and deployment. Increasingly cited in procurement; a reasonable thing to ask vendors whether they hold or track."],
["EU AI Act","The world's first comprehensive AI law, phasing in through 2025–27: risk-tiered obligations from banned practices to high-risk system requirements (which include AI in education and admissions). Relevant even in Indiana — it shapes global vendor behavior the way GDPR did."],
["Open weights vs. closed","Open-weight models (Llama, DeepSeek, Mistral) publish their parameters for anyone to download, run, and modify; closed models (GPT, Claude, Gemini) are accessible only through APIs. The tradeoff — control, cost, and privacy vs. capability, support, and liability — is a recurring university decision."],
["Data provenance & training data","Where a model's training data came from, whether it was licensed, and whether your institution's data will be used for future training. The last question belongs in every contract: 'Is our data used to train your models, and can we opt out in writing?'"]
];

{t:"Evals: browse HELM and LMArena", u:"https://crfm.stanford.edu/helm/", type:"hands-on", time:"45 min", n:"Stanford's HELM (transparent benchmarks) and lmarena.ai (human preference rankings). Learn what the leaderboards measure and how they're gamed."},

{t:"Capstone: briefing + vendor question bank", u:"", type:"exercise", time:"105 min", n:"Produce two artifacts: (1) a two-page 'State of AI for our university' briefing synthesizing all four weeks; (2) a 15-question vendor due-diligence bank drawn from this curriculum (training data use? which evals? red-teaming? RAG or fine-tuned? open or closed weights? NIST/ISO alignment?)."}
],
deliv:"Capstone: two-page leadership briefing + 15-question vendor due-diligence bank."

];

/* ---------- RETENTION / STRATEGY ---------- */
const STRATEGY = `
<h2>How to Get the Most from 32 Hours</h2>
<p class="lede">Candid feedback on the plan itself, then the scaffolding that will make it stick.</p>

<h3>Three honest critiques of the framing</h3>
<div class="card"><div class="tip"><span class="tipnum">1</span><div><strong>32 hours buys fluency, not expertise — and fluency is the right goal.</strong> Nobody becomes an AI expert in a month, PhD or not, and pretending otherwise leads to brittle overconfidence. What 32 well-spent hours genuinely buys: you will understand every term in a vendor pitch, follow a research talk's argument, and ask the question in the room that reveals whether someone knows what they're talking about. For a Deputy CAIO, that is the job. Calibrated confidence — knowing exactly where your understanding ends — will earn you more credibility with faculty than false depth.</div></div></div>
<div class="card"><div class="tip"><span class="tipnum">2</span><div><strong>A definitions-first approach risks passive familiarity.</strong> Your instinct to start from a term list is good for coverage but dangerous for depth: recognizing a definition feels like knowing. The curriculum counters this by making you produce something every week — memos, spoken explanations, a capstone. Do not skip the exercises to fit in more reading; an hour of writing beats two hours of watching, every time. The research on the generation effect and retrieval practice is unambiguous here.</div></div></div>
<div class="card"><div class="tip"><span class="tipnum">3</span><div><strong>Plan the maintenance orbit now.</strong> The field moves fast enough that a static month of learning depreciates ~30% per year. Before Week 4 ends, set a standing 1–2 hr/week habit: one newsletter for news (Import AI or The Batch), one for depth (Sebastian Raschka's Ahead of AI), the AI Index annually, and — most valuable — a monthly coffee with one technical faculty member where you make them explain their current work to you. Your role gives you access no course can match; use the humans.</div></div></div>

<h3>Retention scaffolding (built into the curriculum)</h3>
<div class="card"><div class="tip"><span class="tipnum">A</span><div><strong>Spaced self-testing.</strong> Each week's glossary self-test re-tests the previous week's misses first. Cover the definition, recall aloud, then reveal. Recall attempts — even failed ones — beat rereading by a wide margin.</div></div></div>
<div class="card"><div class="tip"><span class="tipnum">B</span><div><strong>The Feynman memos are the curriculum.</strong> One page per week, each for a different real audience (dean, faculty senate, vendor). Explaining without jargon is the most sensitive test of understanding ever devised, and you finish the month with four reusable artifacts for your actual job.</div></div></div>
<div class="card"><div class="tip"><span class="tipnum">C</span><div><strong>Interleave, don't binge.</strong> Spread each week over 3–4 sittings rather than one Saturday. Sleep consolidation between sessions is not optional equipment. The session list is ordered — videos first for intuition, readings to consolidate, production to test.</div></div></div>
<div class="card"><div class="tip"><span class="tipnum">D</span><div><strong>Anchor to real decisions.</strong> As you learn each concept, attach it to a live question at your university: RAG → the chatbot proposal someone will pitch you; open weights → the research computing request; NIST RMF → your first policy draft. Concepts anchored to consequences don't fade.</div></div></div>
<div class="card"><div class="tip"><span class="tipnum">E</span><div><strong>Use an AI assistant as a sparring partner, not a summarizer.</strong> After each session, have Claude or ChatGPT quiz you, challenge your memo drafts, and role-play a skeptical CS professor. Asking it to summarize the material for you defeats the purpose; asking it to find the holes in your explanation is the single best use of the technology for learning the technology.</div></div></div>

<h3>If you find spare hours</h3>
<div class="card"><p>Deeper optional tracks, in priority order: <a href="https://github.com/mlabonne/llm-course" style="color:var(--crimson)">mlabonne's LLM Course</a> (structured roadmap with notebooks), <a href="https://www.deeplearning.ai/short-courses/" style="color:var(--crimson)">DeepLearning.AI short courses</a> (free 1-hour targeted modules on RAG, agents, evals), and Karpathy's <a href="https://www.youtube.com/watch?v=kCc8FmEb1nY" style="color:var(--crimson)">Let's build GPT from scratch</a> if you ever want to see the machinery with your own eyes — it's 2 hours of code and it permanently demystifies the field.</p></div>
`;

/* ---------- RENDER ---------- */
const main = document.getElementById('main');
const nav = document.getElementById('nav');
const tabs = [
  {id:'glossary', label:'Glossary'},
  ...WEEKS.map((w,i)=>({id:'w'+(i+1), label:'Week '+(i+1)})),
  {id:'strategy', label:'Strategy & Retention'}
];

let store = {};
try{ store = JSON.parse(localStorage.getItem('aiflu')||'{}'); }catch(e){ store = {}; }
function save(){ try{ localStorage.setItem('aiflu', JSON.stringify(store)); }catch(e){} }

/* glossary panel */
let g = '<div class="panel" id="glossary"><h2>The Vocabulary of Modern AI</h2><p class="lede">Fifty-four terms, five layers of the stack. Enough to hold a substantive conversation with a computer scientist, a vendor, or a policymaker — and to know which is bluffing.</p><input id="gsearch" class="sans" placeholder="Filter terms… (e.g., diffusion, RLHF, agent)"><dl id="glist">';
GLOSSARY.forEach(item=>{
  if(item[1]==="" && item[2]===""){ g += '<div class="gcat sans gitem" data-t="">'+item[0]+'</div>'; }
  else { g += '<div class="term gitem" data-t="'+(item[0]+' '+item[1]).toLowerCase().replace(/"/g,'')+'"><dt>'+item[0]+'</dt><dd>'+item[1]+'</dd></div>'; }
});
g += '</dl></div>';

/* week panels */
let wp = '';
WEEKS.forEach((w,wi)=>{
  wp += '<div class="panel" id="w'+(wi+1)+'"><div class="week-head"><h2>'+w.title+'</h2><span class="hours sans">'+w.hours+'</span></div>';
  wp += '<div class="goalbox"><strong>Goal:</strong> '+w.goal+'</div>';
  w.sessions.forEach((s,si)=>{
    const id = 'w'+wi+'s'+si;
    const done = store[id] ? ' done' : '';
    const chk = store[id] ? ' checked' : '';
    const title = s.u ? '<a href="'+s.u+'" target="_blank" rel="noopener">'+s.t+'</a>' : s.t;
    wp += '<div class="card session'+done+'" id="card-'+id+'"><input type="checkbox" data-id="'+id+'"'+chk+'><div><div class="s-title">'+title+'</div><div class="s-note">'+s.n+'</div><div class="meta sans"><span class="tag '+s.type+'">'+s.type+'</span><span class="tag time">'+s.time+'</span></div></div></div>';
  });
  wp += '<div class="deliverable"><strong>Week '+(wi+1)+' deliverable:</strong> '+w.deliv+'</div></div>';
});

main.innerHTML = g + wp + '<div class="panel" id="strategy">'+STRATEGY+'</div>' +
'<div class="footer-note sans">Built July 2026 · All resources free · Curriculum: conceptual depth with light math, scoped for a university AI strategy &amp; governance role. Progress saves in this browser.</div>';

/* nav */
tabs.forEach((t,i)=>{
  const b = document.createElement('button');
  b.textContent = t.label;
  b.onclick = ()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(t.id).classList.add('active');
    window.scrollTo(0,0);
  };
  nav.appendChild(b);
});
nav.children[0].classList.add('active');
document.getElementById('glossary').classList.add('active');

/* checkboxes + progress */
const total = WEEKS.reduce((a,w)=>a+w.sessions.length,0);
function updateProgress(){
  const done = Object.values(store).filter(Boolean).length;
  document.getElementById('pfill').style.width = (100*done/total)+'%';
  document.getElementById('ptext').textContent = done+' of '+total+' sessions complete';
}
document.querySelectorAll('.session input').forEach(cb=>{
  cb.addEventListener('change',()=>{
    store[cb.dataset.id] = cb.checked;
    document.getElementById('card-'+cb.dataset.id).classList.toggle('done', cb.checked);
    save(); updateProgress();
  });
});
updateProgress();

/* glossary search */
document.getElementById('gsearch').addEventListener('input',e=>{
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.gitem').forEach(el=>{
    if(el.classList.contains('gcat')){ el.style.display = q ? 'none':''; return; }
    el.style.display = (!q || el.dataset.t.includes(q)) ? '' : 'none';
  });
});
</script>
</body>
</html>
